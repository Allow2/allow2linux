app-id: com.allow2.allow2linux
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
command: allow2linux

finish-args:
  # Display access (Wayland + X11 + framebuffer for SDL2 overlay)
  - --socket=wayland
  - --socket=x11
  - --socket=fallback-x11
  - --device=dri

  # Network for Allow2 API communication
  - --share=network

  # Read /proc for process classification
  - --filesystem=/proc:ro

  # Home directory for credentials (~/.allow2/) and config
  - --filesystem=home

  # Session bus for desktop notifications (notify-send)
  - --socket=session-bus
  - --talk-name=org.freedesktop.Notifications

  # System bus for loginctl (session lock/terminate)
  - --system-talk-name=org.freedesktop.login1

  # Access to libsecret (credential storage)
  - --talk-name=org.freedesktop.secrets

  # Unix sockets for overlay IPC
  - --filesystem=/tmp

modules:
  # ── Node.js 20 LTS ──────────────────────────────────────────
  - name: nodejs
    buildsystem: simple
    build-commands:
      - install -D -m 755 bin/node /app/bin/node
      - cp -r lib/node_modules /app/lib/node_modules
      - ln -s ../lib/node_modules/npm/bin/npm-cli.js /app/bin/npm
    sources:
      - type: archive
        only-arches:
          - x86_64
        url: https://nodejs.org/dist/v20.18.0/node-v20.18.0-linux-x64.tar.gz
        sha256: 9b9dd2f9b3e09cbfca222e0f3fee0e987e5765d3d7bf2d87afa0025d0e8a64d3
      - type: archive
        only-arches:
          - aarch64
        url: https://nodejs.org/dist/v20.18.0/node-v20.18.0-linux-arm64.tar.gz
        sha256: b42e871f3d28289cd84a2e6e68e076d4fb3ce6ddc30eb9a58dd3d89c35c0fc39

  # ── allow2 SDK (Node.js) ────────────────────────────────────
  - name: allow2-sdk
    buildsystem: simple
    build-commands:
      - mkdir -p /app/lib/allow2-sdk
      - cp -r src package.json /app/lib/allow2-sdk/
      - cd /app/lib/allow2-sdk && /app/bin/npm install --omit=dev --no-optional
    sources:
      - type: dir
        path: ../../sdk/node

  # ── allow2-lock-overlay (C + SDL2) ──────────────────────────
  - name: allow2-lock-overlay
    buildsystem: simple
    build-commands:
      - make
      - install -D -m 755 allow2-lock-overlay /app/bin/allow2-lock-overlay
      - install -D -m 644 assets/Inter-Regular.ttf /app/bin/assets/Inter-Regular.ttf
      - install -D -m 644 assets/Inter-Bold.ttf /app/bin/assets/Inter-Bold.ttf
    sources:
      - type: dir
        path: ../packages/allow2-lock-overlay

  # ── allow2linux daemon (Node.js) ────────────────────────────
  - name: allow2linux
    buildsystem: simple
    build-commands:
      - mkdir -p /app/lib/allow2linux
      - cp -r src config systemd package.json /app/lib/allow2linux/
      # Remove the allow2 dep (it's installed as a sibling module, not via npm)
      - cd /app/lib/allow2linux && sed -i '/"allow2"/d' package.json
      - cd /app/lib/allow2linux && /app/bin/npm install --omit=dev --no-optional
      # Symlink the SDK so bare 'import "allow2"' resolves
      - ln -s /app/lib/allow2-sdk /app/lib/allow2linux/node_modules/allow2
      # Install the launcher script
      - install -D -m 755 allow2linux.sh /app/bin/allow2linux
      # Desktop entry, metainfo, and icon from data/
      - install -D -m 644 data/com.allow2.allow2linux.desktop /app/share/applications/com.allow2.allow2linux.desktop
      - install -D -m 644 data/com.allow2.allow2linux.metainfo.xml /app/share/metainfo/com.allow2.allow2linux.metainfo.xml
      - install -D -m 644 data/icons/hicolor/scalable/apps/com.allow2.allow2linux.svg /app/share/icons/hicolor/scalable/apps/com.allow2.allow2linux.svg
    sources:
      - type: dir
        path: ../packages/allow2linux
      # Pull in data/ from repo root
      - type: dir
        path: ../data
        dest: data
      # Launcher script
      - type: inline
        dest-filename: allow2linux.sh
        contents: |
          #!/bin/sh
          exec /app/bin/node /app/lib/allow2linux/src/index.js "$@"
