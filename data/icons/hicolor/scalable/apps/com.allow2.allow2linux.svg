<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#2C5F9E"/>
    </linearGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#E8F0FE" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Shield shape -->
  <path d="M256 80 L400 140 C400 140 410 300 256 430 C102 300 112 140 112 140 Z"
        fill="url(#shield)" stroke="#2C5F9E" stroke-width="4"/>
  <!-- Checkmark inside shield -->
  <path d="M196 250 L236 290 L320 200"
        fill="none" stroke="#4A90D9" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Clock arc at bottom of shield -->
  <circle cx="256" cy="340" r="36" fill="none" stroke="#4A90D9" stroke-width="8" stroke-dasharray="160 67"/>
  <!-- Clock hands -->
  <line x1="256" y1="340" x2="256" y2="316" stroke="#2C5F9E" stroke-width="6" stroke-linecap="round"/>
  <line x1="256" y1="340" x2="272" y2="336" stroke="#2C5F9E" stroke-width="4" stroke-linecap="round"/>
</svg>
