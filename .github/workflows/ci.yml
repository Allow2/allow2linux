name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Lint & Test ──────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install daemon dependencies
        run: cd packages/allow2linux && npm ci
      - name: Run daemon tests
        run: cd packages/allow2linux && npm test || true

  # ── Build C overlay ─────────────────────────────────────────
  build-overlay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install SDL2 dev headers
        run: sudo apt-get update && sudo apt-get install -y libsdl2-dev libsdl2-ttf-dev
      - name: Build overlay binary
        run: make -C packages/allow2-lock-overlay

  # ── Generate Flatpak offline sources ────────────────────────
  # Regenerates node-sources.json from the real yarn.lock so
  # flatpak-builder can install all deps (allow2 SDK + ws + express
  # + all transitive) in offline mode.
  flatpak-sources:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test, build-overlay]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install yarn (classic)
        run: npm install -g yarn

      - name: Install flatpak-node-generator
        run: pip3 install --break-system-packages flatpak-node-generator

      - name: Refresh yarn.lock from latest npm registry
        run: |
          cd packages/allow2linux
          yarn install
          echo "==> yarn.lock updated"

      - name: Generate Flatpak offline sources from real yarn.lock
        run: |
          flatpak-node-generator yarn packages/allow2linux/yarn.lock \
            -o flatpak/flathub/node-sources.json
          echo "==> Generated node-sources.json with $(grep -c '"type"' flatpak/flathub/node-sources.json) entries"

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet flatpak/ packages/allow2linux/yarn.lock && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit updated sources
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flatpak/flathub/node-sources.json packages/allow2linux/yarn.lock
          # Clean up stale files from previous layout
          git rm -f flatpak/node-sources.json flatpak/flathub/sdk-node-sources.json flatpak/flathub/daemon-node-sources.json 2>/dev/null || true
          git commit -m "ci: regenerate Flatpak offline sources"
          git push
