name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Lint & Test ──────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install daemon dependencies
        run: cd packages/allow2linux && npm ci
      - name: Run daemon tests
        run: cd packages/allow2linux && npm test || true

  # ── Build C overlay ─────────────────────────────────────────
  build-overlay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install SDL2 dev headers
        run: sudo apt-get update && sudo apt-get install -y libsdl2-dev libsdl2-ttf-dev
      - name: Build overlay binary
        run: make -C packages/allow2-lock-overlay

  # ── Generate Flatpak offline sources ────────────────────────
  # Regenerates yarn.lock + flatpak-node-generator output when
  # package.json changes. Commits result back to the repo.
  flatpak-sources:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test, build-overlay]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install yarn (classic)
        run: npm install -g yarn

      - name: Install flatpak-node-generator
        run: pip install flatpak-node-generator

      - name: Generate SDK yarn.lock and sources
        run: |
          cd /tmp
          mkdir sdk-offline && cd sdk-offline
          # Create a minimal package.json matching the SDK's deps
          cat > package.json << 'EOF'
          {
            "name": "allow2-sdk-flatpak",
            "private": true,
            "dependencies": {
              "express": "^4.21.0"
            }
          }
          EOF
          yarn install
          flatpak-node-generator yarn yarn.lock -o sdk-node-sources.json
          cp sdk-node-sources.json $GITHUB_WORKSPACE/flatpak/

      - name: Generate daemon yarn.lock and sources
        run: |
          cd /tmp
          mkdir daemon-offline && cd daemon-offline
          # Daemon only needs ws (allow2 SDK is symlinked separately)
          cat > package.json << 'EOF'
          {
            "name": "allow2linux-flatpak",
            "private": true,
            "dependencies": {
              "ws": "^8.18.0"
            }
          }
          EOF
          yarn install
          flatpak-node-generator yarn yarn.lock -o daemon-node-sources.json
          cp daemon-node-sources.json $GITHUB_WORKSPACE/flatpak/

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet flatpak/ && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit updated sources
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flatpak/sdk-node-sources.json flatpak/daemon-node-sources.json
          git commit -m "ci: regenerate Flatpak offline sources"
          git push
