name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Lint & Test ──────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install daemon dependencies
        run: cd packages/allow2linux && npm ci
      - name: Run daemon tests
        run: cd packages/allow2linux && npm test || true

  # ── Build C overlay ─────────────────────────────────────────
  build-overlay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install SDL2 dev headers
        run: sudo apt-get update && sudo apt-get install -y libsdl2-dev libsdl2-ttf-dev
      - name: Build overlay binary
        run: make -C packages/allow2-lock-overlay

  # ── Validate Flatpak offline sources can be generated ────────
  # Verifies that node-sources.json generates cleanly from yarn.lock.
  # Does NOT commit — node-sources.json lives in the Flathub repo
  # (or is generated locally by rebuild-clean.sh on the Steam Deck).
  flatpak-sources:
    runs-on: ubuntu-latest
    needs: [test, build-overlay]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install yarn (classic)
        run: npm install -g yarn

      - name: Install flatpak-node-generator
        run: pip3 install --break-system-packages flatpak-node-generator

      - name: Refresh yarn.lock from latest npm registry
        run: |
          cd packages/allow2linux
          yarn install
          echo "==> yarn.lock updated"

      - name: Generate and validate Flatpak offline sources
        run: |
          flatpak-node-generator yarn packages/allow2linux/yarn.lock \
            -o node-sources.json
          ENTRIES=$(grep -c '"type"' node-sources.json)
          echo "==> Generated node-sources.json with ${ENTRIES} entries"
          # Sanity check: must have allow2 SDK and ws at minimum
          grep -q 'allow2-' node-sources.json || { echo "ERROR: allow2 SDK missing from sources"; exit 1; }
          grep -q 'ws-' node-sources.json || { echo "ERROR: ws missing from sources"; exit 1; }

      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: flatpak-node-sources
          path: node-sources.json
          retention-days: 90
